name: Auto Fix, Build and Deploy Flutter Web

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  fix-structure:
    name: Check and Fix Flutter Structure
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Check and create missing Flutter files
        run: |
          changed=false

          if [ ! -f "pubspec.yaml" ]; then
            cat > pubspec.yaml <<'EOF'
          name: flutter_sivusto
          description: Flutterilla tehty yksinkertainen verkkosivusto.
          publish_to: "none"

          version: 1.0.0+1

          environment:
            sdk: ">=3.4.0 <4.0.0"

          dependencies:
            flutter:
              sdk: flutter

          dev_dependencies:
            flutter_test:
              sdk: flutter
            flutter_lints: ^5.0.0

          flutter:
            uses-material-design: true
          EOF
            changed=true
          fi

          if [ ! -d "lib" ]; then
            mkdir -p lib
            changed=true
          fi

          if [ ! -f "lib/main.dart" ]; then
            cat > lib/main.dart <<'EOF'
          import 'package:flutter/material.dart';

          void main() {
            runApp(const MyWebsite());
          }

          class MyWebsite extends StatelessWidget {
            const MyWebsite({super.key});

            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                title: 'Flutter Sivusto',
                debugShowCheckedModeBanner: false,
                theme: ThemeData(
                  colorScheme: ColorScheme.fromSeed(seedColor: Colors.blue),
                  useMaterial3: true,
                ),
                home: const HomePage(),
              );
            }
          }

          class HomePage extends StatelessWidget {
            const HomePage({super.key});

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                appBar: AppBar(
                  title: const Text('Oma Sivusto'),
                ),
                body: const Center(
                  child: Text(
                    'Tervetuloa Flutter sivustolle!',
                    style: TextStyle(fontSize: 28),
                    textAlign: TextAlign.center,
                  ),
                ),
              );
            }
          }
          EOF
            changed=true
          fi

          if [ ! -d "web" ]; then
            mkdir -p web
            changed=true
          fi

          if [ ! -f "web/index.html" ]; then
            cat > web/index.html <<'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <base href="$FLUTTER_BASE_HREF">

            <meta charset="UTF-8">
            <meta content="IE=Edge" http-equiv="X-UA-Compatible">
            <meta name="description" content="Flutter web app.">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">

            <title>Flutter Sivusto</title>
            <link rel="manifest" href="manifest.json">
          </head>
          <body>
            <script src="flutter_bootstrap.js" async></script>
          </body>
          </html>
          EOF
            changed=true
          fi

          if [ ! -f "web/manifest.json" ]; then
            cat > web/manifest.json <<'EOF'
          {
            "name": "Flutter Sivusto",
            "short_name": "Sivusto",
            "start_url": ".",
            "display": "standalone",
            "background_color": "#ffffff",
            "theme_color": "#2196f3",
            "description": "Flutterilla tehty sivusto.",
            "orientation": "portrait-primary",
            "prefer_related_applications": false
          }
          EOF
            changed=true
          fi

          if [ "$changed" = true ]; then
            git add pubspec.yaml lib web
            git commit -m "Auto-create missing Flutter project files"
            git push
          else
            echo "Flutter structure already exists."
          fi

  build:
    name: Build Flutter Web
    runs-on: ubuntu-latest
    needs: fix-structure

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build web app
        run: flutter build web --release --base-href "/${{ github.event.repository.name }}/"

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: build/web

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
